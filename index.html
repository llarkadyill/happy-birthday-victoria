<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Вика! 🎂 Победа за нами!</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            /* 1. БАЗОВЫЙ ФОН: Глубокий темно-бордовый */
            background-color: #3b0a0a; 
            color: #fff;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 2. ГЛАВНЫЙ КОНТЕЙНЕР (relative, чтобы позиционировать всё внутри) */
        #collage-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 3. ФОН С ТЕКСТУРОЙ И ГИРЛЯНДАМИ */
        #collage-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* БРО: Измени путь к фоновой текстуре или просто удали, если не нужна */
            background-image: url('path/to/background_texture.jpg'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0.15; /* Сделать текстуру едва заметной */
            z-index: 1;
        }

        /* 4. ЗАГОЛОВОК (С Днем Рождения!) */
        #header-text {
            font-size: 3rem; color: #ff4d6d;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
            margin-top: 10vh; margin-bottom: 30px;
            font-style: italic; text-align: center;
            opacity: 0; transition: opacity 1s ease-in; z-index: 20;
        }
        #header-text.visible { opacity: 1; }

        /* 5. ЦЕНТРАЛЬНОЕ ФОТО (самое большое) */
        #central-photo {
            width: 90%; max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 5px solid rgba(255, 255, 255, 0.1);
            position: relative; z-index: 30;
            opacity: 0; transition: opacity 1s ease-in 0.5s;
        }
        #central-photo.visible { opacity: 1; }

        /* 6. КОНТЕЙНЕР ДЛЯ РАЗБРОСАННЫХ ФОТО НА ФОНЕ */
        #scattered-photos {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; /* Ниже заголовка и центрального фото */
        }

        /* Общие стили для разбросанных фото */
        .scattered-photo {
            position: absolute;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            opacity: 0; /* Скрыты по умолчанию */
            transition: opacity 1s ease-in;
            border: 3px solid rgba(255, 255, 255, 0.05);
        }
        .scattered-photo.visible { opacity: 1; }

        /* БРО: НАСТРОЙКА РАЗМЕРА И УГЛА НАКЛОНА ДЛЯ КАЖДОГО ФОТО (Примерные значения) */
        
        /* Кигуруми */
        .sc-photo-1 { top: 15%; left: 5%; width: 22%; transform: rotate(-5deg); transition-delay: 1.2s; }
        /* Поцелуй */
        .sc-photo-2 { top: 10%; right: 10%; width: 20%; transform: rotate(10deg); transition-delay: 1.4s; }
        /* Группа */
        .sc-photo-3 { top: 40%; left: 10%; width: 25%; transform: rotate(8deg); transition-delay: 1.6s; }
        /* Селфи с бокалом */
        .sc-photo-4 { top: 45%; right: 5%; width: 21%; transform: rotate(-10deg); transition-delay: 1.8s; }
        /* Селфи в черном */
        .sc-photo-5 { bottom: 10%; left: 15%; width: 20%; transform: rotate(-15deg); transition-delay: 2.0s; }
        /* Улыбка */
        .sc-photo-6 { bottom: 15%; right: 15%; width: 23%; transform: rotate(12deg); transition-delay: 2.2s; }

        /* 7. ГИРЛЯНДЫ (String Lights) НА ФОНЕ */
        #string-lights {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; opacity: 0.1;
        }
        .string-light { position: absolute; }
        .sl-1 { top: 20%; left: 30%; width: 5px; height: 5px; background: #ffc978; border-radius: 50%; box-shadow: 0 0 10px #ffc978; }
        /* Добавь больше огоньков... */

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            #header-text { font-size: 2.2rem; }
            #central-photo { max-width: 320px; }
            .scattered-photo { width: 30%; } /* Увеличим размер для мобильных */
            .sc-photo-1 { top: 18%; left: 8%; width: 28%; }
            .sc-photo-2 { top: 15%; right: 12%; width: 26%; }
            .sc-photo-3 { top: 45%; left: 15%; width: 30%; }
            .sc-photo-4 { top: 48%; right: 10%; width: 28%; }
            .sc-photo-5 { bottom: 8%; left: 20%; width: 26%; }
            .sc-photo-6 { bottom: 10%; right: 18%; width: 28%; }
        }

    </style>
</head>
<body>

    <div id="collage-background"></div>

    <div id="collage-container">
        
        <h1 id="header-text">С Днем Рождения!</h1>
        
        <img src="path/to/victoria_main.jpg" id="central-photo" alt="Виктория">

        <div id="scattered-photos">
            <img src="path/to/victoria_kigurumi.jpg" class="scattered-photo sc-photo-1" alt="Вика Кигуруми">
            <img src="path/to/victoria_kiss.jpg" class="scattered-photo sc-photo-2" alt="Вика Поцелуй">
            <img src="path/to/victoria_group.jpg" class="scattered-photo sc-photo-3" alt="Вика Группа">
            <img src="path/to/victoria_selfie_glass.jpg" class="scattered-photo sc-photo-4" alt="Вика Селфи">
            <img src="path/to/victoria_selfie_black.jpg" class="scattered-photo sc-photo-5" alt="Вика Селфи 2">
            <img src="path/to/victoria_smile.jpg" class="scattered-photo sc-photo-6" alt="Вика Улыбка">
        </div>

        <div id="string-lights">
            <div class="string-light sl-1"></div>
            </div>

    </div>

    <script>
        // --- АНИМАЦИЯ ПЛАВНОГО ПОЯВЛЕНИЯ ПРИ ЗАГРУЗКЕ ---
        window.addEventListener('load', () => {
            document.getElementById('header-text').classList.add('visible');
            document.getElementById('central-photo').classList.add('visible');
            const photos = document.querySelectorAll('.scattered-photo');
            photos.forEach(photo => photo.classList.add('visible'));
        });
    </script>
</body>
</html>
